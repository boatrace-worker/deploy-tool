<!DOCTYPE html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Worker Deploy Tool</title>
<style>
*{box-sizing:border-box}
body{background:#0a0a14;color:#ccc;font-family:sans-serif;padding:20px;max-width:500px;margin:0 auto}
h1{color:#ffd700;font-size:18px;margin-bottom:4px}
p.sub{font-size:11px;color:#666;margin-bottom:16px}
label{display:block;margin-top:12px;font-size:12px;color:#888}
input{width:100%;padding:8px;background:#1a1a2e;border:1px solid #333;color:#ffd700;border-radius:4px;font-size:14px;margin-top:4px}
button{margin-top:16px;width:100%;padding:14px;background:#1a2a1a;border:2px solid #34c759;color:#34c759;font-size:16px;font-weight:900;border-radius:8px}
button:disabled{opacity:0.4}
#log{margin-top:16px;padding:12px;background:#111;border:1px solid #222;border-radius:8px;font-size:11px;line-height:1.6;white-space:pre-wrap;max-height:400px;overflow-y:auto;display:none}
.ok{color:#34c759}.err{color:#ff2d55}.info{color:#ffd700}.dim{color:#555}
</style></head><body>
<h1>Worker Deploy Tool</h1>
<p class="sub">Private GitHub → Cloudflare Workers</p>
<label>GitHub Token</label>
<input id="ghtoken" placeholder="ghp_xxxxx">
<label>Cloudflare Account ID</label>
<input id="acid" placeholder="32文字の英数字">
<label>Cloudflare API Token</label>
<input id="cftoken" placeholder="CF API Token">
<button id="btn" onclick="run()">デプロイ実行</button>
<div id="log"></div>
<script>
var REPO="boatrace-worker/boatrace-worker";
var WORKER="boatrace-kaiji";
var KV_ID="2fb152961d714ed38129b49905e46a05";
function lg(m,c){var e=document.getElementById("log");e.style.display="block";e.innerHTML+='<div class="'+(c||"")+'">'+m+'</div>';e.scrollTop=e.scrollHeight}
async function run(){
  var ght=document.getElementById("ghtoken").value.trim();
  var acid=document.getElementById("acid").value.trim();
  var cft=document.getElementById("cftoken").value.trim();
  var btn=document.getElementById("btn");
  if(!ght||!acid||!cft){lg("3つとも入力してください","err");return}
  btn.disabled=true;btn.textContent="実行中...";
  document.getElementById("log").innerHTML="";
  try{
    lg("1/4 GitHubからコード取得...","info");
    var ghResp=await fetch("https://api.github.com/repos/"+REPO+"/contents/src/index.js",{
      headers:{"Authorization":"token "+ght,"Accept":"application/vnd.github.v3.raw"}});
    if(!ghResp.ok)throw new Error("GitHub: "+ghResp.status);
    var code=await ghResp.text();
    lg("  "+code.length+"文字取得","ok");

    lg("2/4 CF認証テスト...","info");
    var testResp=await fetch("https://api.cloudflare.com/client/v4/accounts/"+acid+"/workers/scripts",{
      headers:{"Authorization":"Bearer "+cft}});
    var testR=await testResp.json();
    if(!testR.success)throw new Error("CF認証失敗: "+JSON.stringify(testR.errors));
    lg("  認証OK","ok");

    lg("3/4 デプロイ中...","info");
    // multipart bodyを手動構築（Blob/FormData回避）
    var boundary="----WD"+Date.now();
    var meta=JSON.stringify({main_module:"index.js",compatibility_date:"2024-01-01",bindings:[{type:"kv_namespace",name:"KV",namespace_id:KV_ID}]});
    var parts=[];
    parts.push("--"+boundary+"\r\nContent-Disposition: form-data; name=\"metadata\"\r\nContent-Type: application/json\r\n\r\n"+meta);
    parts.push("--"+boundary+"\r\nContent-Disposition: form-data; name=\"index.js\"; filename=\"index.js\"\r\nContent-Type: application/javascript+module\r\n\r\n"+code);
    parts.push("--"+boundary+"--");
    var body=parts.join("\r\n");

    var cfResp=await fetch("https://api.cloudflare.com/client/v4/accounts/"+acid+"/workers/scripts/"+WORKER,{
      method:"PUT",
      headers:{"Authorization":"Bearer "+cft,"Content-Type":"multipart/form-data; boundary="+boundary},
      body:body});
    var r=await cfResp.json();
    if(!r.success)throw new Error("CF: "+JSON.stringify(r.errors));
    lg("  デプロイ成功！","ok");

    lg("4/4 Cron設定...","info");
    var cronResp=await fetch("https://api.cloudflare.com/client/v4/accounts/"+acid+"/workers/scripts/"+WORKER+"/schedules",{
      method:"PUT",
      headers:{"Authorization":"Bearer "+cft,"Content-Type":"application/json"},
      body:JSON.stringify([{cron:"*/2 * * * *"}])});
    var cr=await cronResp.json();
    if(cr.success)lg("  Cron完了","ok");
    else lg("  Cron: "+JSON.stringify(cr.errors),"err");

    lg("","dim");
    lg("=== 完了 ===","ok");
    lg("https://"+WORKER+".hoshi-line-bot.workers.dev","ok");
  }catch(e){
    lg("","dim");
    lg("エラー: "+e.message,"err");
  }
  btn.disabled=false;btn.textContent="デプロイ実行";
}
["ghtoken","acid","cftoken"].forEach(function(id){
  var el=document.getElementById(id);
  var s=localStorage.getItem("dt_"+id);
  if(s)el.value=s;
  el.addEventListener("input",function(){localStorage.setItem("dt_"+id,el.value)});
});
</script>
</body></html>
