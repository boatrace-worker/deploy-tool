name: Deploy Worker
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch worker code from private repo
        run: |
          curl -s -H "Authorization: token ${{ secrets.GH_PAT }}" \
            -H "Accept: application/vnd.github.v3.raw" \
            "https://api.github.com/repos/boatrace-worker/boatrace-worker/contents/src/index.js" \
            -o index.js
          echo "Downloaded $(wc -c < index.js) bytes"
      - name: Setup wrangler.toml
        run: |
          cat > wrangler.toml << 'TOML'
          name = "boatrace-kaiji"
          main = "index.js"
          compatibility_date = "2024-01-01"
          [triggers]
          crons = ["*/2 * * * *"]
          [[kv_namespaces]]
          binding = "KV"
          id = "2fb152961d714ed38129b49905e46a05"
          TOML
      - name: Deploy to Cloudflare
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          command: deploy
