name: Deploy Worker
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch worker code
        run: |
          curl -sf -H "Authorization: token ${{ secrets.GH_PAT }}" \
            "https://raw.githubusercontent.com/boatrace-worker/boatrace-worker/main/src/index.js" \
            -o index.js
          head -1 index.js
          echo "Size: $(wc -c < index.js) bytes"
      - name: Create wrangler.toml
        run: |
          echo 'name = "boatrace-kaiji"' > wrangler.toml
          echo 'main = "index.js"' >> wrangler.toml
          echo 'compatibility_date = "2024-01-01"' >> wrangler.toml
          echo '[triggers]' >> wrangler.toml
          echo 'crons = ["*/2 * * * *"]' >> wrangler.toml
          echo '[[kv_namespaces]]' >> wrangler.toml
          echo 'binding = "KV"' >> wrangler.toml
          echo 'id = "2fb152961d714ed38129b49905e46a05"' >> wrangler.toml
      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          command: deploy
